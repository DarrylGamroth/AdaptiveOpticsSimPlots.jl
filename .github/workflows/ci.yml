name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        julia-version: ['1.12']
    steps:
      - name: Checkout AdaptiveOpticsSimPlots
        uses: actions/checkout@v6
        with:
          path: AdaptiveOpticsSimPlots.jl

      - name: Checkout AdaptiveOpticsSim
        uses: actions/checkout@v6
        with:
          repository: DarrylGamroth/AdaptiveOpticsSim.jl
          path: AdaptiveOpticsSim.jl

      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.julia-version }}

      - name: Develop sibling AdaptiveOpticsSim
        working-directory: AdaptiveOpticsSimPlots.jl
        run: |
          julia --startup-file=no --project=. -e 'using Pkg; Pkg.develop(path="../AdaptiveOpticsSim.jl"); Pkg.instantiate()'

      - name: Run tests
        working-directory: AdaptiveOpticsSimPlots.jl
        env:
          GKSwstype: "100"
        run: julia --startup-file=no --project=. -e 'using Pkg; Pkg.test()'
